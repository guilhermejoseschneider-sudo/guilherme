<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeatFlow Pro - Música & Ritmo</title>
  <style>
    :root {
      --primary: #ff00cc;
      --secondary: #00ffff;
      --bg-dark: #0f0c29;
      --glass: rgba(255, 255, 255, 0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container { max-width: 900px; width: 100%; }

    header { text-align: center; margin-bottom: 30px; }
    h1 { 
      font-size: 3.5rem; 
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(255,0,204,0.3));
    }

    /* Player */
    .player {
      background: var(--glass);
      backdrop-filter: blur(25px);
      border-radius: 30px;
      padding: 40px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    /* Equalizador Simulado */
    .visualizer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 30px;
      margin-bottom: 20px;
    }
    .bar {
      width: 4px;
      background: var(--secondary);
      height: 10%;
      transition: height 0.2s ease;
    }
    .playing .bar { animation: bounce 0.8s ease infinite alternate; }
    @keyframes bounce { from { height: 10%; } to { height: 100%; } }

    .album-art-wrapper {
      width: 220px; height: 220px;
      margin: 0 auto 20px;
      position: relative;
    }

    .album-art {
      width: 100%; height: 100%;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.1);
      overflow: hidden;
      transition: 0.5s;
    }
    .album-art.spinning { animation: rotate 10s linear infinite; }

    .song-info h2 { font-size: 1.8rem; }
    .song-info p { color: var(--secondary); margin-bottom: 20px; }

    /* Controles Pro */
    .main-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
    }

    .btn {
      background: none; border: none; color: white;
      font-size: 1.4rem; cursor: pointer; transition: 0.3s;
      opacity: 0.6;
    }
    .btn:hover { opacity: 1; transform: scale(1.2); }
    .btn.active { color: var(--primary); opacity: 1; }

    .btn-play {
      background: white; color: black;
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; opacity: 1;
    }

    /* Volume */
    .volume-box {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-top: 15px;
    }
    input[type="range"] { cursor: pointer; accent-color: var(--secondary); }

    /* Busca e Playlist */
    .search-box {
      width: 100%; padding: 12px; margin: 30px 0 15px;
      background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: white; outline: none;
    }

    .playlist-item {
      display: flex; align-items: center; gap: 15px;
      padding: 12px; background: var(--glass);
      margin-bottom: 8px; border-radius: 12px; cursor: pointer;
      transition: 0.2s;
    }
    .playlist-item:hover { background: rgba(255,255,255,0.1); }
    .playlist-item.active { border-left: 5px solid var(--primary); background: rgba(255,0,204,0.1); }

    .playlist-item img { width: 45px; height: 45px; border-radius: 6px; }
    
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .progress-bg { 
        height: 6px; background: rgba(255,255,255,0.1); 
        border-radius: 5px; cursor: pointer; margin-top: 10px;
    }
    .progress-bar { 
        height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary)); 
        border-radius: 5px; position: relative;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>BeatFlow Pro</h1>
    <p>Premium Audio Experience</p>
  </header>

  <div class="player" id="playerNode">
    <div class="visualizer" id="viz">
      </div>

    <div class="album-art-wrapper">
      <div class="album-art" id="artFrame">
        <img src="" id="trackArt" style="width:100%; height:100%; object-fit:cover;">
      </div>
    </div>

    <div class="song-info" style="text-align:center;">
      <h2 id="trackTitle">Nome da Música</h2>
      <p id="trackArtist">Artista</p>
    </div>

    <div class="main-controls">
      <button class="btn" onclick="toggleShuffle()" id="shuffleBtn">🔀</button>
      <button class="btn" onclick="prevTrack()">⏮</button>
      <button class="btn btn-play" onclick="togglePlay()" id="playBtn">▶</button>
      <button class="btn" onclick="nextTrack()">⏭</button>
      <button class="btn" onclick="toggleRepeat()" id="repeatBtn">🔁</button>
    </div>

    <div class="progress-container">
      <div class="progress-bg" onclick="setSeek(event)">
        <div class="progress-bar" id="progBar"></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:5px; color:#888;">
        <span id="curTime">0:00</span>
        <span id="durTime">0:00</span>
      </div>
    </div>

    <div class="volume-box">
      <button class="btn" onclick="toggleMute()" style="font-size:1rem" id="muteBtn">🔊</button>
      <input type="range" id="volRange" min="0" max="1" step="0.1" value="1" oninput="updateVolume(this.value)">
      <button class="btn" onclick="toggleFav()" style="font-size:1rem" id="favBtn">🖤</button>
    </div>
  </div>

  <input type="text" class="search-box" placeholder="Buscar na sua biblioteca..." onkeyup="filterTracks(this.value)">

  <div id="playlistList"></div>
</div>

<audio id="mainAudio"></audio>

<script>
  const tracks = [
    { title: "Midnight Drive", artist: "Neon Waves", cover: "https://picsum.photos/id/200/300", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", fav: false },
    { title: "Electric Dreams", artist: "Luna Echo", cover: "https://picsum.photos/id/201/300", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", fav: false },
    { title: "Cyberpunk Rain", artist: "Retro Future", cover: "https://picsum.photos/id/202/300", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", fav: false },
    { title: "Skyline", artist: "Aero", cover: "https://picsum.photos/id/203/300", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", fav: false }
  ];

  let index = 0;
  let isPlaying = false;
  let isShuffle = false;
  let isRepeat = false;

  const audio = document.getElementById('mainAudio');
  const playlistList = document.getElementById('playlistList');

  // Criar barras do equalizador
  const viz = document.getElementById('viz');
  for(let i=0; i<20; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.animationDelay = `${i * 0.05}s`;
    viz.appendChild(bar);
  }

  function loadTrack(trackIndex) {
    const t = tracks[trackIndex];
    document.getElementById('trackTitle').innerText = t.title;
    document.getElementById('trackArtist').innerText = t.artist;
    document.getElementById('trackArt').src = t.cover;
    audio.src = t.src;
    document.getElementById('favBtn').innerText = t.fav ? '❤️' : '🖤';
    renderPlaylist();
  }

  function togglePlay() {
    if(isPlaying) {
      audio.pause();
      document.getElementById('playBtn').innerText = '▶';
      document.getElementById('playerNode').classList.remove('playing');
      document.getElementById('artFrame').classList.remove('spinning');
    } else {
      audio.play();
      document.getElementById('playBtn').innerText = '⏸';
      document.getElementById('playerNode').classList.add('playing');
      document.getElementById('artFrame').classList.add('spinning');
    }
    isPlaying = !isPlaying;
  }

  function nextTrack() {
    if (isRepeat) { /* mantem index */ }
    else if (isShuffle) { index = Math.floor(Math.random() * tracks.length); }
    else { index = (index + 1) % tracks.length; }
    loadTrack(index);
    if(isPlaying) audio.play();
  }

  function prevTrack() {
    index = (index - 1 + tracks.length) % tracks.length;
    loadTrack(index);
    if(isPlaying) audio.play();
  }

  function updateVolume(v) { 
    audio.volume = v;
    document.getElementById('muteBtn').innerText = v == 0 ? '🔇' : '🔊';
  }

  function toggleMute() {
    audio.muted = !audio.muted;
    document.getElementById('muteBtn').innerText = audio.muted ? '🔇' : '🔊';
  }

  function toggleShuffle() {
    isShuffle = !isShuffle;
    document.getElementById('shuffleBtn').classList.toggle('active');
  }

  function toggleRepeat() {
    isRepeat = !isRepeat;
    document.getElementById('repeatBtn').classList.toggle('active');
  }

  function toggleFav() {
    tracks[index].fav = !tracks[index].fav;
    document.getElementById('favBtn').innerText = tracks[index].fav ? '❤️' : '🖤';
    renderPlaylist();
  }

  function filterTracks(query) {
    const filtered = tracks.filter(t => t.title.toLowerCase().includes(query.toLowerCase()));
    renderPlaylist(filtered);
  }

  function setSeek(e) {
    const width = e.currentTarget.clientWidth;
    const clickX = e.offsetX;
    audio.currentTime = (clickX / width) * audio.duration;
  }

  audio.ontimeupdate = () => {
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progBar').style.width = pct + '%';
    document.getElementById('curTime').innerText = formatTime(audio.currentTime);
    document.getElementById('durTime').innerText = formatTime(audio.duration || 0);
  };

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec < 10 ? '0' : ''}${sec}`;
  }

  function renderPlaylist(list = tracks) {
    playlistList.innerHTML = '';
    list.forEach((t, i) => {
      const realIndex = tracks.indexOf(t);
      const item = document.createElement('div');
      item.className = `playlist-item ${realIndex === index ? 'active' : ''}`;
      item.onclick = () => { index = realIndex; loadTrack(index); if(!isPlaying) togglePlay(); else audio.play(); };
      item.innerHTML = `
        <img src="${t.cover}">
        <div style="flex:1">
          <strong>${t.title}</strong><br>
          <small>${t.artist}</small>
        </div>
        <span>${t.fav ? '❤️' : ''}</span>
      `;
      playlistList.appendChild(item);
    });
  }

  audio.onended = nextTrack;
  loadTrack(index);
</script>
</body>
</html>>
